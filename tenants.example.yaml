# VibeSwarm tenant manifest — the ONLY file a human (or Ansible) edits.
# `vswarm render` turns this into generated/docker-compose.yml + angie config.
#
# NOTE: the parser supports this exact, simple schema (top-level scalars +
# a `tenants:` list of {email, name}). Keep it flat; see docs/DEPLOYMENT.md.

# Public hostname fronted by Cloudflare Access (no scheme).
domain: t3code.example.com

# Workspace image name (built by `vswarm build`).
image: vswarm/workspace:latest

# Optional deployment-owned Dockerfile layered onto the stock image by
# `vswarm build` (extra toolchains, org CLIs — no fork of the built-in
# template). Contract: it must start with `ARG VSWARM_BASE_IMAGE` and
# `FROM ${VSWARM_BASE_IMAGE}`; its directory is the build context. The stock
# image is built under `<image>-base`; the overlay produces the final tag.
# image_overlay: workspace-overlay.Dockerfile

# Image for the per-tenant postgres sidecar (`services: [postgres]` below).
# Started as `vswarm-db-<name>` on the tenant's own network; data lives on a
# named volume `vswarm-dbdata-<name>` that survives container recreates.
db_image: timescale/timescaledb:2.28.2-pg17

# Per-tenant resource limits (applied to every workspace container).
resources:
  cpus: "2.0"
  memory: 6g
  pids: 4096

# Bearer-token lifetime minted for each tenant's T3 session.
# `vswarm pair` re-mints before expiry.
token_ttl: 30d

# One entry per user. `name` must be DNS-safe: [a-z0-9-], used for
# container/network/volume names (vswarm-<name>, vswarm-net-<name>).
# `email` MUST match the identity Cloudflare Access asserts
# (Cf-Access-Authenticated-User-Email).
# Optional `services:` opt-in per tenant (inline flow list — the tenant block
# does not support block-style `-` lists). Only known services are accepted;
# an unknown name is rejected at parse time. `postgres` starts a dev sidecar
# and delivers ~/.pg.env into the tenant home (see docs/DEPLOYMENT.md).
# Optional `admin: true` marks a tenant for host SSH access. vswarm NEVER
# touches host ssh config or authorized_keys — the deployment layer mints the
# key at ~/.ssh/vswarm-admin; vswarm only carries the flag and enforces
# doctor invariants around the key file (see docs/DEPLOYMENT.md).
tenants:
  - email: sarah@example.com
    name: sarah
    services: [postgres]
    admin: true
  - email: alex@example.com
    name: alex
